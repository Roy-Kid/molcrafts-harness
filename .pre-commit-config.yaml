# Managed by prek: `prek install`
default_install_hook_types: [pre-commit, pre-push]

# Local hooks mirror .github/workflows/validate-plugins.yml exactly.
# Single source of truth for "what CI runs" — keep commands in lockstep.
# Install:  pre-commit install && pre-commit install --hook-type pre-push
# Run all:  pre-commit run --all-files


repos:
  - repo: local
    hooks:
      - id: validate-repository
        name: validate plugin metadata (CI parity)
        entry: python3 plugins/mol-plugin/scripts/validate_repository.py --root .
        language: system
        pass_filenames: false
        always_run: true

      - id: test-model-policy
        name: structural unit tests — model policy
        entry: python3 plugins/mol-plugin/tests/test_model_policy.py
        language: system
        pass_filenames: false
        always_run: true

      - id: test-project-blueprint
        name: structural unit tests — project blueprint
        entry: python3 plugins/mol-plugin/tests/test_project_blueprint_mechanism.py
        language: system
        pass_filenames: false
        always_run: true
